<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Do it</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logop.jpeg">
</head>
<body>
    <section id="loader">
        <div class="lcont">
            <img src="images/logo.png" alt="Just do it">
            <div class="loader"></div>
            <div class="lmsg">Getting your tasks ready</div>
        </div>
    </section>
    <section id="content">
        <div class="app glass">
            <div class="title">
                <img src="images/logo.png" alt="Just do it ">
                <h3>Things To do</h3>
                
            </div>
            <div class="row">   
                <input type="text"  id="inputbox" placeholder="Add your tasks">
                <button onclick="addtask()">Add</button>
            </div>
            <ul id="licont">
                
            </ul>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
